 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interview Pro Simulator</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🎯 Interview Pro</h1> -

  <!-- Category Selection -->
   <div id="categoryBox">
    <p>Select Category</p>
    <button onclick="startInterview('hr')">HR</button>
    <button onclick="startInterview('tech')">Tech</button>
  </div> 

  <!-- Quiz -->
   <div id="quizBox" class="hidden">
    <h2 id="question"></h2>
    <textarea id="answer" placeholder="Type your answer..."></textarea>

    <div class="bottom">
      <span id="timer">30</span>
      <button onclick="nextQuestion()">Next</button>
    </div>
  </div> 

  <!-- Result -->
   <div id="resultBox" class="hidden">
    <h2>Result</h2>
    <p id="score"></p>
    <p id="feedback"></p>
    <button onclick="location.reload()">Restart</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
